<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>All Bookings</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="navbar">
    <span>🎬 PVR Elite — Booking History</span>
    <a href="/admin" class="btn btn-small">Back to Admin</a>
    <a href="/logout" class="btn btn-small">Logout</a>
</div>
<div class="container">
    <div class="card">
        <h2>All Bookings</h2>
        <table th:if="${!#lists.isEmpty(bookings)}">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Customer Name</th>
                    <th>Phone</th>
                    <th>Show ID</th>
                    <th>Seat</th>
                    <th>Payment</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="b : ${bookings}">
                    <td th:text="${b.id}">1</td>
                    <td th:text="${b.customerName}">John</td>
                    <td th:text="${b.phone}">9999999999</td>
                    <td th:text="${b.showId}">SH1</td>
                    <td th:text="${b.seatNumber}">B3</td>
                    <td th:text="${b.paymentType}">UPI</td>
                </tr>
            </tbody>
        </table>
        <p th:if="${#lists.isEmpty(bookings)}" class="no-data">No bookings yet.</p>
    </div>
</div>
</body>
</html>
