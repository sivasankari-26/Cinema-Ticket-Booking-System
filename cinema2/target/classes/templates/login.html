<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cinema Login</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
    <div class="card login-card">
        <div class="theater-info">
            <h1>🎬 PVR Elite</h1>
            <p>Madurai | Screen 4 | 25 Seats</p>
        </div>
        <h2>Login</h2>
        <p th:if="${error}" class="error-msg" th:text="${error}"></p>
        <p th:if="${success}" class="success-msg" th:text="${success}"></p>
        <form action="/login" method="post">
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="Enter your email" required />
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter password" required />
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;">Login</button>
        </form>
        <p class="hint">Don't have an account? <a href="/register" style="color:#e94560;">Register here</a></p>
        <p class="hint" style="margin-top:8px;">Admin: admin@gmail.com / Siva$123</p>
    </div>
</div>
</body>
</html>
